<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MDM Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: oklch(0.992 0.003 250);
      --bg-2: oklch(0.975 0.004 250);
      --bg-3: oklch(0.955 0.005 250);
      --panel: #ffffff;
      --border: oklch(0.918 0.006 250);
      --border-strong: oklch(0.86 0.008 250);
      --fg: oklch(0.18 0.012 250);
      --fg-2: oklch(0.36 0.012 250);
      --fg-3: oklch(0.55 0.012 250);
      --fg-4: oklch(0.70 0.010 250);
      --accent: oklch(0.50 0.14 252);
      --accent-2: oklch(0.42 0.15 252);
      --accent-soft: oklch(0.96 0.025 252);
      --accent-border: oklch(0.88 0.05 252);
      --ok: oklch(0.62 0.13 155);
      --warn: oklch(0.70 0.14 70);
      --danger: oklch(0.58 0.18 27);
      --radius: 8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 0 rgba(15, 22, 36, 0.04), 0 1px 2px rgba(15, 22, 36, 0.04);
      --shadow: 0 1px 0 rgba(15, 22, 36, 0.04), 0 8px 24px -8px rgba(15, 22, 36, 0.08);
    }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-feature-settings: 'cv11', 'ss01', 'ss03';
      color: var(--fg);
      background: var(--bg);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    ::selection { background: var(--accent-soft); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: oklch(0.88 0.008 250); border-radius: 8px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: oklch(0.78 0.008 250); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" src="data.jsx"></script>
  <script type="text/babel" data-presets="react" src="ui.jsx"></script>
  <script type="text/babel" data-presets="react" src="sidebar.jsx"></script>
  <script type="text/babel" data-presets="react" src="chat.jsx"></script>
  <script type="text/babel" data-presets="react" src="inspector.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
